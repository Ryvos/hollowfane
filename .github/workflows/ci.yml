name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GODOT_VERSION: "4.6.2"

jobs:
  license-gate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run license gate
        run: python3 tools/check_licenses.py

  build:
    needs: license-gate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        include:
          - os: ubuntu-22.04
            preset: "Linux/X11"
            ext: ""
          - os: windows-latest
            preset: "Windows Desktop"
            ext: ".exe"
          - os: macos-latest
            preset: "macOS"
            ext: ".app"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.godot-cache
          key: godot-${{ env.GODOT_VERSION }}-${{ matrix.os }}

      - name: Install Godot ${{ env.GODOT_VERSION }}
        shell: bash
        run: |
          # Real implementation lands when the export presets do (Week 2+).
          # For v0.1.0 we just verify the project imports headlessly.
          echo "Godot install step — TODO: pin to ${GODOT_VERSION} via godotenv or curl"
          echo "Skipping in v0.1.0 spike; CI gates expand alongside export_presets.cfg."

      - name: Headless import (placeholder)
        if: false
        run: godot --headless --import

      - name: Headless export (placeholder)
        if: false
        run: |
          mkdir -p build
          godot --headless --export-release "${{ matrix.preset }}" build/HOLLOWFANE${{ matrix.ext }}

      - name: Upload artifact (placeholder)
        if: false
        uses: actions/upload-artifact@v4
        with:
          name: HOLLOWFANE-${{ matrix.os }}
          path: build/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build release notes path
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          minor="$(echo "$tag" | sed -E 's/^v([0-9]+\.[0-9]+).*/\1/')"
          echo "file=RELEASE_NOTES_v${minor}.md" >> "$GITHUB_OUTPUT"
      - name: Draft GitHub Release
        if: false
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: ${{ steps.notes.outputs.file }}
          files: |
            HOLLOWFANE-ubuntu-22.04/**
            HOLLOWFANE-windows-latest/**
            HOLLOWFANE-macos-latest/**
