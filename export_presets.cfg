; HOLLOWFANE export presets (spec §11 DoD: "godot --headless --export-release
; produces runnable binaries on Linux/Windows/macOS").
;
; The CI workflow (.github/workflows/ci.yml) installs Godot 4.6 export
; templates into ~/.local/share/godot/export_templates/4.6.stable/ before
; calling --export-release. Without those templates an export will fail with
; "No export template found at the expected path"; that's a tooling install
; step, not a code issue.
;
; The presets here are a minimal parseable triple — each one's
; `binary_format/architecture` is x86_64 for Linux/Windows; macOS goes
; universal. PCK is embedded so the artifact is a single file per platform.
; Settings any further than this (icons, code-signing, notarization,
; per-platform bundling) belong post-launch.

[preset.0]

name="Linux/X11"
platform="Linux/X11"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/linux/HOLLOWFANE.x86_64"
encryption_include_filters=""
encryption_exclude_filters=""
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=true
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
binary_format/architecture="x86_64"
ssh_remote_deploy/enabled=false

[preset.1]

name="Windows Desktop"
